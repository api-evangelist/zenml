aid: zenml
name: ZenML
description: >-
  ZenML is an open-source MLOps and LLMOps framework that unifies machine
  learning and generative AI workflows through a single orchestration,
  versioning, and governance layer. It provides a Python SDK, CLI, REST API,
  and server for managing pipelines, stacks, artifacts, models, and
  deployments across any infrastructure backend, with 60+ integrations
  spanning orchestrators, ML frameworks, GenAI tools, cloud storage, and
  experiment tracking platforms.
type: Index
position: Consumer
access: 3rd-Party
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - AI
  - Machine Learning
  - MLOps
  - LLMOps
  - Pipelines
  - Open Source
  - Python
created: '2025-02-08'
modified: '2026-05-03'
