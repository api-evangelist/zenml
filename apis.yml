aid: zenml
name: ZenML
description: >-
  ZenML is a unified MLOps framework that enables teams to develop, evaluate,
  and deploy machine learning pipelines and AI agents on any infrastructure.
  It provides a Python SDK, REST API, and server for managing ML pipelines,
  stacks, artifacts, and deployments across cloud providers.
