apis:
  - aid: zenml:zenml-oss-api
    name: ZenML OSS REST API
    description: >-
      The ZenML open-source REST API exposes endpoints for managing ML
      pipelines, stacks, components, artifacts, models, deployments, runs,
      schedules, secrets, users, and projects in a self-hosted ZenML server.
      It is consumed by the Python SDK and CLI and can be called directly for
      automation and integration with CI/CD systems and MLOps workflows.
    humanURL: https://docs.zenml.io/api-reference/oss-api
    tags:
      - MLOps
      - Pipelines
      - Open Source
    properties:
      - type: Documentation
        url: https://docs.zenml.io/api-reference/oss-api
      - type: APIReference
        url: https://docs.zenml.io/api-reference/oss-api
      - type: OpenAPI
        url: openapi/zenml-openapi.yml
      - type: GettingStarted
